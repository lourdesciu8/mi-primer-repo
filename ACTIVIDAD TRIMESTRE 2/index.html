<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <title>SISTEMA DE GESTIÓN DE TRABAJADORES</title>
  </head>
  <body>
    <main>
      <div class="container mt-4">
        <!-- Parte superior -->
        <div class="text-center">
          <h1>Sistema de Gestión de Trabajadores</h1>
        </div>

        <!-- Parte central -->
        <div class="row mt-4">
          <!-- Parte izquierda (formulario) -->
          <div class="left-side">
            <h4><u>Formulario de datos</u></h4>
            <form id="workerForm">
              <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" class="form-control" id="nombre" />
              </div>
              <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" class="form-control" id="apellido" />
              </div>
              <div class="form-group">
                <label for="correo">Correo:</label>
                <input type="email" class="form-control" id="correo" />
              </div>
              <div class="form-group">
                <label for="departamento">Departamento:</label>
                <select class="form-control" id="departamento">
                  <option value="IT">IT</option>
                  <option value="Marketing">Marketing</option>
                  <option value="Ventas">Ventas</option>
                  <option value="Administración">Administración</option>
                </select>
              </div>
              <button
                type="button"
                class="btn btn-primary"
                onclick="agregarTrabajador()"
              >
                Guardar Cambios
              </button>
            </form>
          </div>

          <!-- Parte derecha (lista de trabajadores) -->
          <div class="right-side">
            <h4><u>Lista de Trabajadores</u></h4>
            <ul id="listaTrabajadores" class="list-group"></ul>
          </div>
        </div>

        <!-- Parte final (resumen de trabajadores por departamento) -->
        <div class="resumenTrabajadores">
          <h4 class="animate__animated animate__backInUp">
            Resumen de Trabajadores por Departamento
          </h4>
          <div id="resumen" class="alert alert-info"></div>
        </div>
      </div>
    </main>
    <script src="./javascript.js"></script>
  </body>
</html>
